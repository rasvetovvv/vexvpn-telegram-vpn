services:
  db:
    image: postgres:16-alpine
    container_name: vpnbot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vpnbot
      POSTGRES_PASSWORD: vpnbot
      POSTGRES_DB: vpnbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpnbot -d vpnbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    container_name: vpnbot_app
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  miniapp:
    build: .
    container_name: vpnbot_miniapp
    restart: unless-stopped
    env_file: .env
    # Privacy: disable Uvicorn access logs so subscription tokens, QR query data and client IPs are not stored in Docker logs.
    command: uvicorn bot.web.main:app --host 0.0.0.0 --port 8080 --no-access-log
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5).status==200 else 1)\""]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 20s
    networks:
      default:
      tgbot-public:
        aliases:
          - proxy-miniapp

volumes:
  pgdata:

networks:
  tgbot-public:
    external: true
    name: tgbot_default
